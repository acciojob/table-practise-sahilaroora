
<!DOCTYPE html>
<html>
<head>
    <title>Student Details Table</title>
    <style>
        table {
            background-color: yellow;
            border-collapse: collapse;
        }
        table, th, tr, td {
            border: 1px solid black;
        }
        th, td {
            padding: 8px;
            text-align: center;
        }
    </style>
</head>
<body>

    <table>
        <caption><strong>Student Details</strong></caption>
        <tr>
            <th>NAME</th>
            <th>AGE</th>
            <th>BRANCH</th>
        </tr>
        <tr>
            <td>Rahul</td>
            <td>20</td>
            <td>Computer Science</td>
        </tr>
        <tr>
            <td>Anjali</td>
            <td>21</td>
            <td>Mechanical</td>
        </tr>
        <tr>
            <td>Sahil</td>
            <td>22</td>
            <td>Electrical</td>
        </tr>
    </table>

</body>
</html>
